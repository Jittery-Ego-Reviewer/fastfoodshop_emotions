<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快餐店情緒大挑戰</title>
    <!-- 引入 React, ReactDOM, Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FEF3C7; /* Tailwind yellow-50 */
            touch-action: manipulation; /* 防止雙擊放大，利於平板操作 */
        }
        
        .slot-machine-anim {
            animation: slotSpin 0.5s ease-in-out infinite alternate;
        }

        @keyframes slotSpin {
            0% { transform: translateY(-5px); }
            100% { transform: translateY(5px); }
        }

        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        /* 隱藏滾動條但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 音效系統 (使用 Web Audio API，無須外部檔案) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        const playSuccess = () => { playTone(523.25, 'sine', 0.1); setTimeout(()=>playTone(659.25, 'sine', 0.2), 100); };
        const playError = () => { playTone(200, 'sawtooth', 0.3); };
        const playPop = () => { playTone(400, 'sine', 0.1, 0.05); };

        // --- 遊戲資料 ---
        const GAME1_DATA = [
            {
                id: 1, pair: '開心 vs 興奮',
                scenario: '爸爸媽媽今天帶你到你喜歡的快餐店吃東西。',
                options: ['傷心', '開心', '緊張'], correct: '開心',
                prop: '無', action: '露出微笑說：「好耶！」'
            },
            {
                id: 2, pair: '開心 vs 興奮',
                scenario: '你在快餐店找到一個靠窗的漂亮梳化位，可以舒舒服服地坐下來吃漢堡包。',
                options: ['害怕', '開心', '興奮'], correct: '開心',
                prop: '膠漢堡', action: '拿著漢堡包坐下，笑著說：「呢個位唔錯，又幾舒服。」'
            },
            {
                id: 3, pair: '開心 vs 興奮',
                scenario: '你打開兒童餐的盒子，發現裡面竟然是你一直都抽不到最想要的玩具！',
                options: ['害怕', '開心', '興奮'], correct: '興奮',
                prop: '玩具', action: '拿著玩具，瞪大眼睛，大叫：「嘩！係我最想要嘅玩具呀！」'
            },
            {
                id: 4, pair: '傷心 vs 失望',
                scenario: '你滿心期待打開兒童餐的玩具，結果發現是你家裡已經有三個的同款玩具。',
                options: ['緊張', '傷心', '失望'], correct: '失望',
                prop: '玩具', action: '拿著玩具，輕輕搖搖頭，無奈地說：「吓，又係呢個，屋企已經有啦。」'
            },
            {
                id: 5, pair: '傷心 vs 失望',
                scenario: '你不小心把剛剛買的軟雪糕掉在地上，不能吃了。',
                options: ['興奮', '傷心', '失望'], correct: '傷心',
                prop: '紙杯/雪糕', action: '看著地上的雪糕，眉頭皺起，扮作抹眼淚說：「嗚嗚，我嘅雪糕跌咗落地下……」'
            },
            {
                id: 6, pair: '傷心 vs 失望',
                scenario: '你排隊排了很久，想買最喜歡的漢堡包，但是收銀員說：「對不起，剛剛賣完了。」',
                options: ['害怕', '傷心', '失望'], correct: '失望',
                prop: '無', action: '垂下肩膀，嘆一口氣說：「唉，排咗咁耐，原來賣晒……」'
            },
            {
                id: 7, pair: '緊張 vs 害怕',
                scenario: '這是你第一次自己走到收銀台點餐，後面還有很多人排隊，你怕自己會講錯。',
                options: ['失望', '緊張', '害怕'], correct: '緊張',
                prop: '硬幣/代幣/八達通', action: '搓搓手，深呼吸，說：「我……我想買一個漢堡包。」'
            },
            {
                id: 8, pair: '緊張 vs 害怕',
                scenario: '你正在吃薯條的時候，覺得好似腳有啲嘢，低頭一望發現有隻大蟑螂！',
                options: ['緊張', '傷心', '害怕'], correct: '害怕',
                prop: '薯條盒和曱甴', action: '原本假裝吃得津津有味。突然停下來，低頭一看，立刻把腳縮起來，瞪大眼睛大叫：「嘩！曱甴呀！」'
            },
            {
                id: 9, pair: '緊張 vs 害怕',
                scenario: '你去完洗手間出來，發現原本坐在位子上的媽媽不見了，周圍全部都是不認識的陌生大人。',
                options: ['緊張', '傷心', '害怕'], correct: '害怕',
                prop: '紙巾', action: '慌張地四處張望，有點想哭地說：「媽媽/爸爸去咗邊呢？」'
            },
            {
                id: 10, pair: '緊張 vs 害怕',
                scenario: '你雙手捧著放滿食物和一大杯滿滿汽水的托盤找座位，很怕自己行路不穩會把可樂打翻。',
                options: ['傷心', '害怕', '緊張'], correct: '緊張',
                prop: '托盤和汽水', action: '雙手夾緊托盤，眼睛直視前方，一步一步小心翼翼地走：「啊，千祈唔好倒瀉呀……」'
            }
        ];

        const GAME2_DATA = [
            {
                pairTitle: '開心 vs 興奮',
                words: ['開心', '興奮'],
                sentences: [
                    { text: "聽到今天晚餐吃快餐，我覺得很", blank: "開心" },
                    { text: "看到快餐店裡有小丑在派氣球和表演魔術時，我", blank: "興奮", suffix: " 得跳了起來！" }
                ]
            },
            {
                pairTitle: '傷心 vs 失望',
                words: ['傷心', '失望'],
                sentences: [
                    { text: "我的薯條被哥哥不小心打翻了，我覺得很", blank: "傷心", suffix: "，流下了眼淚。" },
                    { text: "我原本以為買兒童餐會送玩具，結果今天派完了，我覺得有點", blank: "失望", suffix: "。" }
                ]
            },
            {
                pairTitle: '緊張 vs 害怕',
                words: ['害怕', '緊張'],
                sentences: [
                    { text: "我不小心把可樂倒在陌生叔叔的鞋子上，他惡狠狠地看著我，我", blank: "害怕", suffix: " 得想馬上躲起來。" },
                    { text: "我從來都沒有試過自己點餐，點餐時我的心跳得好快，覺得有點", blank: "緊張", suffix: "。" }
                ]
            }
        ];

        const GAME3_DATA = [
            {
                q: '我自己捧著滿滿的餐盤行路找座位，好怕會把可樂跌在地上，我覺得好「緊張」。',
                isCorrect: true, reason: '心跳加速、要小心翼翼的感覺是緊張。'
            },
            {
                q: '我排隊拿餐的時候，突然有一隻好大的老鼠跑出來，我覺得好「興奮」！',
                isCorrect: false, reason: '看到可怕的東西會想逃跑，應該是「害怕」，不是興奮。'
            },
            {
                q: '爸爸買了我最喜歡的熱香餅給我，我覺得很「開心」。',
                isCorrect: true, reason: '得到喜歡的東西會覺得開心。'
            },
            {
                q: '店員說雪糕機壞了，今天沒有雪糕吃，我的期待落空了，我覺得好「害怕」。',
                isCorrect: false, reason: '想吃但吃不到，期待落空，應該是「失望」。'
            },
            {
                q: '明天學校旅行會去快餐店吃午餐，還可以參觀廚房，我今晚「興奮」得睡不著覺！',
                isCorrect: true, reason: '非常期待、睡不著覺是興奮的強烈表現。'
            },
            {
                q: '我不小心把剛買的漢堡包跌在坑渠裡，不能吃了，我覺得好「緊張」。',
                isCorrect: false, reason: '失去了喜歡的食物想哭，應該是「傷心」。'
            }
        ];

        // --- 共用組件 ---
        const Button = ({ onClick, children, className, disabled, color = 'red' }) => {
            const colors = {
                red: 'bg-red-500 hover:bg-red-600 border-red-700',
                yellow: 'bg-yellow-400 hover:bg-yellow-500 border-yellow-600 text-slate-800',
                blue: 'bg-blue-500 hover:bg-blue-600 border-blue-700',
                green: 'bg-green-500 hover:bg-green-600 border-green-700',
                gray: 'bg-gray-300 border-gray-400 text-gray-500 cursor-not-allowed'
            };
            const activeColor = disabled ? colors.gray : colors[color];
            
            return (
                <button 
                    onClick={() => { if(!disabled) { playPop(); onClick(); } }}
                    disabled={disabled}
                    className={`px-6 py-3 rounded-2xl font-bold text-xl md:text-2xl text-white border-b-4 active:border-b-0 active:translate-y-1 transition-all ${activeColor} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const Card = ({ children, className }) => (
            <div className={`bg-white rounded-3xl p-6 shadow-xl border-4 border-yellow-400 ${className}`}>
                {children}
            </div>
        );

        // --- 遊戲一：情境配對與演出 ---
        const Game1 = ({ onComplete, addScore, goHome }) => {
            const [round, setRound] = React.useState(0);
            const [isSpinning, setIsSpinning] = React.useState(false);
            const [currentScenario, setCurrentScenario] = React.useState(null);
            const [showAction, setShowAction] = React.useState(false);
            const [wrongAns, setWrongAns] = React.useState(null);

            // 隨機挑選 4 題來玩
            const [shuffledData] = React.useState([...GAME1_DATA].sort(() => 0.5 - Math.random()).slice(0, 4));

            const totalRounds = shuffledData.length;

            const pullLever = () => {
                setIsSpinning(true);
                setWrongAns(null);
                playTone(300, 'square', 0.5, 0.05); // 模擬抽獎聲
                
                setTimeout(() => {
                    setIsSpinning(false);
                    setCurrentScenario(shuffledData[round]);
                    playTone(600, 'sine', 0.2); // 出現提示聲
                }, 1500);
            };

            const handleOptionClick = (opt) => {
                if (opt === currentScenario.correct) {
                    playSuccess();
                    addScore(10);
                    setShowAction(true);
                } else {
                    playError();
                    setWrongAns(opt);
                    setTimeout(() => setWrongAns(null), 800);
                }
            };

            const nextRound = () => {
                setShowAction(false);
                setCurrentScenario(null);
                if (round + 1 < totalRounds) {
                    setRound(round + 1);
                } else {
                    onComplete();
                }
            };

            return (
                <div className="flex flex-col items-center w-full max-w-4xl mx-auto bounce-in">
                    <h2 className="text-3xl font-black text-red-600 mb-2 drop-shadow-sm">🍔 遊戲一：情境大抽獎</h2>
                    <p className="text-lg text-gray-700 mb-6 font-bold">抽出情境，選出正確情緒，然後演出來！</p>
                    
                    <div className="w-full flex justify-between items-center mb-4 px-4">
                        <span className="text-xl font-bold text-yellow-600">進度: {round}/{totalRounds}</span>
                        <button onClick={goHome} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold transition-colors shadow-sm">🏠 回到主頁</button>
                    </div>

                    <Card className="w-full flex flex-col items-center min-h-[400px] relative">
                        {!currentScenario && !isSpinning && (
                            <div className="flex flex-col items-center justify-center flex-grow">
                                <div className="text-6xl mb-6">🎁</div>
                                <Button color="red" className="text-3xl px-10 py-5" onClick={pullLever}>
                                    👇 點擊抽取情境
                                </Button>
                            </div>
                        )}

                        {isSpinning && (
                            <div className="flex flex-col items-center justify-center flex-grow slot-machine-anim">
                                <div className="text-6xl mb-4">🍟🍔🥤🍦</div>
                                <p className="text-2xl font-bold text-gray-500">正在為你尋找情境...</p>
                            </div>
                        )}

                        {currentScenario && !showAction && (
                            <div className="flex flex-col items-center w-full bounce-in">
                                <div className="bg-yellow-100 p-6 rounded-2xl w-full text-center border-2 border-yellow-300 mb-8">
                                    <p className="text-2xl font-bold text-gray-800 leading-relaxed">
                                        {currentScenario.scenario}
                                    </p>
                                </div>
                                <p className="text-xl font-bold text-red-500 mb-4">你覺得這時候會覺得...</p>
                                <div className="flex flex-wrap justify-center gap-4 w-full">
                                    {currentScenario.options.map((opt, i) => (
                                        <button
                                            key={i}
                                            onClick={() => handleOptionClick(opt)}
                                            className={`px-8 py-4 rounded-full font-bold text-2xl border-4 transition-transform hover:scale-105 active:scale-95
                                                ${wrongAns === opt ? 'bg-red-200 border-red-500 text-red-700 shake' : 'bg-white border-blue-400 text-blue-600 hover:bg-blue-50'}
                                            `}
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {showAction && (
                            <div className="flex flex-col items-center w-full bounce-in text-center">
                                <div className="text-6xl mb-4">🌟</div>
                                <h3 className="text-3xl font-black text-green-600 mb-6">答對了！是「{currentScenario.correct}」</h3>
                                
                                <div className="bg-blue-50 border-4 border-blue-200 rounded-2xl p-6 w-full mb-8">
                                    <h4 className="text-xl font-bold text-blue-800 mb-4 border-b-2 border-blue-200 pb-2">🎬 小演員時間</h4>
                                    <div className="text-left space-y-4 text-lg">
                                        <p><span className="font-bold text-gray-700">準備道具：</span> <span className="bg-yellow-200 px-2 rounded">{currentScenario.prop}</span></p>
                                        <p><span className="font-bold text-gray-700">演出動作與對白：</span></p>
                                        <p className="text-2xl font-bold text-red-600 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                            {currentScenario.action}
                                        </p>
                                    </div>
                                </div>

                                <Button color="green" onClick={nextRound} className="w-full max-w-sm text-2xl">
                                    ✅ 演出完成，下一題
                                </Button>
                            </div>
                        )}
                    </Card>
                </div>
            );
        };

        // --- 遊戲二：句子配對 (點擊填空模式，適合觸控) ---
        const Game2 = ({ onComplete, addScore, goHome }) => {
            const [pairIndex, setPairIndex] = React.useState(0);
            const [answers, setAnswers] = React.useState({}); // { sentenceIndex: word }
            const [selectedWord, setSelectedWord] = React.useState(null);
            
            const currentData = GAME2_DATA[pairIndex];
            const isPairComplete = currentData.sentences.every((_, i) => answers[i] === currentData.sentences[i].blank);

            const handleWordSelect = (word) => {
                setSelectedWord(selectedWord === word ? null : word);
            };

            const handleBlankClick = (sIndex, correctWord) => {
                if (!selectedWord) return;

                if (selectedWord === correctWord) {
                    playSuccess();
                    setAnswers(prev => ({ ...prev, [sIndex]: selectedWord }));
                    setSelectedWord(null);
                    addScore(5);
                } else {
                    playError();
                    // 錯誤視覺回饋
                    const el = document.getElementById(`blank-${sIndex}`);
                    if(el) {
                        el.classList.add('shake', 'bg-red-200');
                        setTimeout(() => el.classList.remove('shake', 'bg-red-200'), 400);
                    }
                }
            };

            const nextPair = () => {
                if (pairIndex + 1 < GAME2_DATA.length) {
                    setPairIndex(pairIndex + 1);
                    setAnswers({});
                    setSelectedWord(null);
                } else {
                    onComplete();
                }
            };

            return (
                <div className="flex flex-col items-center w-full max-w-4xl mx-auto bounce-in">
                    <h2 className="text-3xl font-black text-blue-600 mb-2 drop-shadow-sm">🍟 遊戲二：填補點餐單</h2>
                    <p className="text-lg text-gray-700 mb-2 font-bold">先點擊下方的詞彙，再點擊句子裡的空格填入。</p>
                    
                    <div className="w-full flex justify-between items-center mb-4 px-4">
                        <span className="bg-blue-100 text-blue-800 px-4 py-1 rounded-full font-bold">
                            挑戰：{currentData.pairTitle}
                        </span>
                        <div className="flex items-center gap-4">
                            <span className="text-xl font-bold text-yellow-600">
                                進度: {pairIndex + 1}/{GAME2_DATA.length}
                            </span>
                            <button onClick={goHome} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold transition-colors shadow-sm">🏠 回到主頁</button>
                        </div>
                    </div>

                    <Card className="w-full mb-6">
                        <div className="space-y-6">
                            {currentData.sentences.map((sentence, i) => {
                                const isFilled = answers[i] === sentence.blank;
                                return (
                                    <div key={i} className="text-2xl leading-loose font-bold text-gray-700 bg-gray-50 p-6 rounded-2xl border-2 border-gray-100">
                                        {sentence.text}
                                        <span 
                                            id={`blank-${i}`}
                                            onClick={() => !isFilled && handleBlankClick(i, sentence.blank)}
                                            className={`
                                                inline-block min-w-[120px] text-center px-4 py-1 mx-2 rounded-xl border-b-4 transition-all
                                                ${isFilled ? 'bg-green-100 text-green-700 border-green-300' : 'bg-white border-gray-300 cursor-pointer hover:bg-yellow-50'}
                                                ${selectedWord && !isFilled ? 'ring-4 ring-yellow-400 ring-opacity-50' : ''}
                                            `}
                                        >
                                            {isFilled ? sentence.blank : '（請填入）'}
                                        </span>
                                        {sentence.suffix}
                                        {isFilled && <span className="ml-2 text-green-500 bounce-in">✅</span>}
                                    </div>
                                );
                            })}
                        </div>
                    </Card>

                    {/* 詞彙庫 */}
                    {!isPairComplete && (
                        <div className="w-full bg-white p-6 rounded-3xl shadow-lg border-4 border-blue-300 flex flex-col items-center">
                            <p className="text-gray-500 font-bold mb-4">👇 點擊選擇詞彙 👇</p>
                            <div className="flex gap-4">
                                {currentData.words.map((word, i) => {
                                    // 若兩個答案都填了這個詞（理論上這裡是一對一，但防錯），隱藏
                                    const isUsed = Object.values(answers).includes(word);
                                    if (isUsed) return null;

                                    return (
                                        <button
                                            key={i}
                                            onClick={() => handleWordSelect(word)}
                                            className={`
                                                px-8 py-4 rounded-xl font-black text-2xl border-b-4 transition-all
                                                ${selectedWord === word 
                                                    ? 'bg-yellow-400 text-white border-yellow-600 scale-110 shadow-lg' 
                                                    : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'}
                                            `}
                                        >
                                            {word}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {isPairComplete && (
                        <div className="bounce-in mt-4">
                            <Button color="green" onClick={nextPair} className="text-2xl px-10 py-4 shadow-xl">
                                🌟 完成！下一關
                            </Button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 遊戲三：句子判斷 (是非題) ---
        const Game3 = ({ onComplete, addScore, goHome }) => {
            const [qIndex, setQIndex] = React.useState(0);
            const [feedback, setFeedback] = React.useState(null); // { isCorrect: bool, msg: string }

            const currentQ = GAME3_DATA[qIndex];

            const handleAnswer = (userSaysTrue) => {
                const isCorrect = userSaysTrue === currentQ.isCorrect;
                if (isCorrect) {
                    playSuccess();
                    addScore(10);
                    setFeedback({ ok: true, msg: "答對了！經理做得好！" });
                } else {
                    playError();
                    setFeedback({ ok: false, msg: `錯誤啦！\n${currentQ.reason}` });
                }
            };

            const nextQ = () => {
                setFeedback(null);
                if (qIndex + 1 < GAME3_DATA.length) {
                    setQIndex(qIndex + 1);
                } else {
                    onComplete();
                }
            };

            return (
                <div className="flex flex-col items-center w-full max-w-4xl mx-auto bounce-in">
                    <h2 className="text-3xl font-black text-green-600 mb-2 drop-shadow-sm">👨‍💼 遊戲三：小經理大考驗</h2>
                    <p className="text-lg text-gray-700 mb-6 font-bold">客人說的情緒詞對不對呢？</p>

                    <div className="w-full flex justify-between items-center mb-4 px-4">
                        <span className="text-xl font-bold text-yellow-600">
                            題目: {qIndex + 1}/{GAME3_DATA.length}
                        </span>
                        <button onClick={goHome} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold transition-colors shadow-sm">🏠 回到主頁</button>
                    </div>

                    <Card className="w-full flex flex-col items-center min-h-[350px]">
                        {!feedback ? (
                            <>
                                <div className="text-6xl mb-4">🗣️</div>
                                <div className="bg-gray-100 p-6 rounded-2xl w-full text-center border-2 border-gray-300 mb-8 relative">
                                    {/* 裝飾性引號 */}
                                    <span className="absolute top-2 left-4 text-4xl text-gray-300 font-serif">"</span>
                                    <p className="text-2xl font-bold text-gray-800 leading-relaxed z-10 relative px-6">
                                        {currentQ.q}
                                    </p>
                                    <span className="absolute bottom-[-10px] right-4 text-4xl text-gray-300 font-serif leading-none">"</span>
                                </div>
                                
                                <div className="flex gap-8 w-full justify-center">
                                    <button 
                                        onClick={() => handleAnswer(true)}
                                        className="flex flex-col items-center justify-center w-32 h-32 md:w-40 md:h-40 bg-green-100 border-4 border-green-500 rounded-3xl hover:bg-green-200 active:scale-95 transition-all shadow-md"
                                    >
                                        <span className="text-5xl mb-2">✅</span>
                                        <span className="font-bold text-xl text-green-700">對 (綠燈)</span>
                                    </button>
                                    <button 
                                        onClick={() => handleAnswer(false)}
                                        className="flex flex-col items-center justify-center w-32 h-32 md:w-40 md:h-40 bg-red-100 border-4 border-red-500 rounded-3xl hover:bg-red-200 active:scale-95 transition-all shadow-md"
                                    >
                                        <span className="text-5xl mb-2">❌</span>
                                        <span className="font-bold text-xl text-red-700">錯 (紅燈)</span>
                                    </button>
                                </div>
                            </>
                        ) : (
                            <div className="flex flex-col items-center justify-center flex-grow w-full bounce-in text-center">
                                <div className="text-7xl mb-4">
                                    {feedback.ok ? '🌟' : '💡'}
                                </div>
                                <h3 className={`text-3xl font-black mb-4 ${feedback.ok ? 'text-green-600' : 'text-red-600'}`}>
                                    {feedback.ok ? '答對了！' : '哎呀，答錯了！'}
                                </h3>
                                
                                <div className={`p-6 rounded-2xl w-full mb-8 text-xl font-bold leading-loose
                                    ${feedback.ok ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}
                                `}>
                                    {feedback.msg.split('\n').map((line, i) => <p key={i}>{line}</p>)}
                                    {feedback.ok && currentQ.reason && (
                                        <p className="text-gray-600 mt-2 text-lg">💡 解釋：{currentQ.reason}</p>
                                    )}
                                </div>

                                <Button color="blue" onClick={nextQ} className="text-2xl px-12">
                                    下一題 ➡️
                                </Button>
                            </div>
                        )}
                    </Card>
                </div>
            );
        };

        // --- 主程式與狀態管理 ---
        const App = () => {
            const [gameState, setGameState] = React.useState('intro'); // intro, game1, game2, game3, summary
            const [score, setScore] = React.useState(0);

            const addScore = (pts) => setScore(s => s + pts);
            
            const restart = () => {
                setScore(0);
                setGameState('intro');
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    {/* Header */}
                    <header className="w-full max-w-4xl flex justify-between items-center mb-8 bg-white px-6 py-4 rounded-full shadow-md border-b-4 border-red-500">
                        <h1 className="text-2xl md:text-3xl font-black text-red-600 flex items-center gap-2">
                            🍟 快餐店情緒大挑戰
                        </h1>
                        {gameState !== 'intro' && gameState !== 'summary' && (
                            <div className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-black text-xl flex items-center gap-2 shadow-inner">
                                🏆 分數: {score}
                            </div>
                        )}
                    </header>

                    {/* Main Content Area */}
                    <main className="w-full flex-grow flex justify-center items-start pt-4">
                        
                        {gameState === 'intro' && (
                            <div className="max-w-2xl w-full text-center bounce-in">
                                <Card className="py-12 px-8 flex flex-col items-center border-red-500">
                                    <div className="text-8xl mb-6">🍔🍟🥤</div>
                                    <h2 className="text-4xl font-black text-red-600 mb-6">歡迎光臨！</h2>
                                    <p className="text-2xl font-bold text-gray-700 mb-8 leading-relaxed">
                                        今天我們要一起玩三個小遊戲，<br/>
                                        學習在不同的情況下，<br/>
                                        應該用什麼「情緒詞語」來表達自己！
                                    </p>
                                    <div className="bg-yellow-100 p-4 rounded-xl mb-8 w-full text-left inline-block">
                                        <p className="font-bold text-lg text-yellow-800 mb-2">🎯 遊戲任務：</p>
                                        <ul className="list-disc pl-6 text-gray-700 font-bold space-y-2">
                                            <li>遊戲一：情境大抽獎 (抽出情境並演出來)</li>
                                            <li>遊戲二：填補點餐單 (找出適合的詞語填充)</li>
                                            <li>遊戲三：小經理大考驗 (判斷客人說得對不對)</li>
                                        </ul>
                                    </div>
                                    <Button color="red" className="text-3xl px-12 py-6 animate-pulse" onClick={() => { playSuccess(); setGameState('game1'); }}>
                                        開始遊戲 🚀
                                    </Button>
                                </Card>
                            </div>
                        )}

                        {gameState === 'game1' && <Game1 onComplete={() => setGameState('game2')} addScore={addScore} goHome={restart} />}
                        {gameState === 'game2' && <Game2 onComplete={() => setGameState('game3')} addScore={addScore} goHome={restart} />}
                        {gameState === 'game3' && <Game3 onComplete={() => setGameState('summary')} addScore={addScore} goHome={restart} />}

                        {gameState === 'summary' && (
                            <div className="max-w-2xl w-full text-center bounce-in">
                                <Card className="py-12 px-8 flex flex-col items-center border-yellow-500 bg-gradient-to-b from-white to-yellow-50">
                                    <div className="text-8xl mb-6 animate-bounce">🎉🏆🌟</div>
                                    <h2 className="text-5xl font-black text-red-600 mb-4 drop-shadow-md">太棒了！</h2>
                                    <p className="text-3xl font-bold text-gray-800 mb-8">
                                        你完成了所有的任務！
                                    </p>
                                    
                                    <div className="bg-white border-4 border-yellow-400 p-8 rounded-full mb-8 shadow-lg">
                                        <p className="text-2xl text-gray-500 font-bold mb-2">總得分</p>
                                        <p className="text-7xl font-black text-yellow-500">{score}</p>
                                    </div>

                                    <p className="text-xl font-bold text-blue-600 mb-8 max-w-md">
                                        你現在已經是一位非常厲害的「情緒表達大師」了！記得在生活中也要多多使用情感詞語喔！
                                    </p>

                                    <Button color="blue" className="text-2xl px-10 py-4" onClick={restart}>
                                        再玩一次 🔄
                                    </Button>
                                </Card>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
